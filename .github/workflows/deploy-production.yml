name: CI and production deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  block-sql:
    name: Block SQL files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fail if SQL, env or backups are tracked
        shell: bash
        run: |
          blocked="$(git ls-files | grep -Ei '(^|/).*\.sql$|(^|/)backups/' || true)"
          env_blocked="$(git ls-files | grep -Ei '(^|/)\.env($|\.)' | grep -Ev '(^|/)\.env\.example$' || true)"

          if [ -n "$blocked$env_blocked" ]; then
            echo "::error::Blocked files detected:"
            [ -n "$blocked" ] && echo "$blocked"
            [ -n "$env_blocked" ] && echo "$env_blocked"
            echo "No se permiten .sql, .env reales ni backups en este repositorio."
            echo ".env.example sí está permitido."
            exit 1
          fi

  validate-php:
    name: Validate PHP files
    runs-on: ubuntu-latest
    needs: block-sql

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PHP CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli

      - name: PHP syntax check
        shell: bash
        run: |
          find api -type f -name "*.php" -print0 | xargs -0 -r -n1 php -l

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - block-sql
      - validate-php
    environment: production
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          printf '%s\n' "${{ secrets.SERVER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Verify deploy user has no SQL access
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'test ! -r /var/www/mysql && test ! -r /var/www/backups && test ! -r /var/www/docs/sql && test ! -r /srv/s3server-private/sql'

      - name: Create code-only backup before deploy
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'mkdir -p ~/deploy-backups && tar --exclude="api/storage/logs" --exclude="api/storage/tmp" --exclude="docs/sql" --exclude="*.sql" -czf ~/deploy-backups/s3server-code-before-${{ github.sha }}.tgz -C /var/www api html docs'

      - name: Deploy API
        shell: bash
        run: |
          rsync -az --delete --delay-updates --chmod=D755,F644 \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.sql' \
            --exclude='**/*.sql' \
            --exclude='storage/logs/' \
            --exclude='storage/tmp/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }}" \
            ./api/ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/api/"

      - name: Deploy HTML
        shell: bash
        run: |
          rsync -az --delete --delay-updates --chmod=D755,F644 \
            --exclude='*.sql' \
            --exclude='**/*.sql' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }}" \
            ./html/ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/html/"

      - name: Deploy docs without SQL
        shell: bash
        run: |
          rsync -az --delete --delay-updates --chmod=D755,F644 \
            --exclude='sql/' \
            --exclude='*.sql' \
            --exclude='**/*.sql' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }}" \
            ./docs/ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/docs/"

      - name: Smoke check
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'test -f /var/www/html/index.html &&
             test -f /var/www/api/public/index.php &&
             test ! -r /var/www/mysql &&
             test ! -r /var/www/backups &&
             test ! -r /var/www/docs/sql &&
             test ! -r /srv/s3server-private/sql'
